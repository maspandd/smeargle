name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mock_data_generator
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  test:
    name: lint typecheck test build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mock_data_generator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit and integration tests
        run: pnpm run test

      - name: Build
        env:
          NEXT_SKIP_GOOGLE_FONTS: "true"
        run: |
          if [ "$NEXT_SKIP_GOOGLE_FONTS" = "true" ]; then
            sed -i 's/import { Geist, Geist_Mono } from "next\/font\/google";/const Geist = () => ({ variable: "" }); const Geist_Mono = () => ({ variable: "" });/' src/app/layout.tsx
          fi
          npm run build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Acceptance tests
        run: pnpm exec playwright test tests/acceptance
